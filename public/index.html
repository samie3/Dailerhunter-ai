<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHunter AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232735;--border:#2d3148;--text:#e2e4ed;--dim:#8b8fa3;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00cec9;--yellow:#fdcb6e;--red:#e17055}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 0 30px}
h1{font-size:2.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.badge{display:inline-block;font-size:.7rem;padding:3px 10px;border-radius:20px;background:var(--surface2);color:var(--dim);border:1px solid var(--border);margin-bottom:20px}
.search-box{display:flex;gap:10px;max-width:640px;margin:0 auto 30px}
.search-box input{flex:1;padding:14px 20px;font-size:1.05rem;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box button{padding:14px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#5a4bd1);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.search-box button:hover{opacity:.9}
.search-box button:disabled{opacity:.5;cursor:not-allowed}
.status{text-align:center;color:var(--dim);margin-bottom:16px;min-height:24px;font-size:.9rem}
.progress-bar{max-width:640px;margin:0 auto 24px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;display:none}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s;width:0}
.results-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:var(--surface2);color:var(--dim);font-weight:600;text-transform:uppercase;font-size:.75rem;letter-spacing:.5px;padding:12px 14px;text-align:left;position:sticky;top:0}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:top}
tr:nth-child(even) td{background:rgba(35,39,53,.5)}
tr:hover td{background:rgba(108,92,231,.08)}
td a{color:var(--accent2);text-decoration:none;word-break:break-all}
td a:hover{text-decoration:underline}
.price{font-weight:700;color:var(--green);white-space:nowrap}
.type{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.75rem;font-weight:600}
.type-official{background:rgba(0,206,201,.15);color:var(--green)}
.type-reseller{background:rgba(162,155,254,.15);color:var(--accent2)}
.type-shared{background:rgba(253,203,110,.15);color:var(--yellow)}
.type-grey-market{background:rgba(225,112,85,.15);color:var(--red)}
.type-trial{background:rgba(139,143,163,.15);color:var(--dim)}
.type-lifetime{background:rgba(0,206,201,.15);color:var(--green)}
.type-bundle{background:rgba(162,155,254,.15);color:var(--accent2)}
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty .icon{font-size:3rem;margin-bottom:12px}
.filters{max-width:640px;margin:0 auto 16px;display:flex;gap:12px;align-items:center;justify-content:center}
.filters label{color:var(--dim);font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:5px}
.filters input[type=checkbox]{accent-color:var(--accent)}
.result-count{text-align:center;color:var(--dim);font-size:.8rem;margin-bottom:10px}
@media(max-width:700px){
  .container{padding:12px}
  header{padding:24px 0 16px}
  h1{font-size:1.7rem}
  .search-box{flex-direction:column}
  .search-box button{padding:12px}
  th,td{padding:8px 6px;font-size:.8rem}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🔍 DealHunter AI</h1>
    <div class="badge">⚡ powered by AI</div>
  </header>
  <div class="search-box">
    <input id="q" type="text" placeholder="Search deals… e.g. ChatGPT Plus, Netflix, Spotify" autofocus>
    <button id="btn" onclick="doSearch()">Hunt Deals</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress-bar" id="pbar"><div class="fill" id="pfill"></div></div>
  <div class="filters" id="filters" style="display:none">
    <label><input type="checkbox" id="priceOnly" checked onchange="rerender()"> Only show results with prices</label>
  </div>
  <div class="result-count" id="rcount"></div>
  <div id="output">
    <div class="empty"><div class="icon">🎯</div>Enter a product or subscription name to find the cheapest deals across the web.</div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
$('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
let _allResults=[];
function rerender(){
  const priced=$('priceOnly').checked;
  const filtered=priced?_allResults.filter(r=>r.price!=null):_allResults;
  $('output').innerHTML=renderTable(filtered);
  $('rcount').textContent=`Showing ${filtered.length} of ${_allResults.length} results`;
}

function typeClass(t){
  const m={'official':'official','reseller':'reseller','shared':'shared','grey-market':'grey-market','trial':'trial','lifetime key':'lifetime','bundle':'bundle'};
  return 'type-'+(m[t]||'reseller');
}

function renderTable(results){
  if(!results.length) return '<div class="empty"><div class="icon">😕</div>No deals found. Try a different search term.</div>';
  let h='<div class="results-wrap"><table><thead><tr><th>Source</th><th>Product / Plan</th><th>Price</th><th>Duration</th><th>Type</th><th>Trust / Risk</th></tr></thead><tbody>';
  for(const r of results){
    h+=`<tr>
      <td><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.source)}</a></td>
      <td>${esc(r.product)}</td>
      <td class="price">${esc(r.priceDisplay)}</td>
      <td>${esc(r.duration)}</td>
      <td><span class="type ${typeClass(r.type)}">${esc(r.type)}</span></td>
      <td>${esc(r.trust)}</td>
    </tr>`;
  }
  return h+'</tbody></table></div>';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function doSearch(){
  const q=$('q').value.trim();
  if(!q)return;
  $('btn').disabled=true;
  $('status').textContent='Starting search…';
  $('pbar').style.display='block';
  $('pfill').style.width='0%';
  $('output').innerHTML='';

  try{
    const es=new EventSource('/api/search?q='+encodeURIComponent(q));
    es.addEventListener('progress',e=>{
      const d=JSON.parse(e.data);
      const pct=Math.round(d.completed/d.total*100);
      $('pfill').style.width=pct+'%';
      $('status').textContent=`Searching sources… ${d.completed}/${d.total}`;
    });
    es.addEventListener('partial',e=>{
      const d=JSON.parse(e.data);
      _allResults=d.results;
      $('filters').style.display='flex';
      rerender();
    });
    es.addEventListener('done',e=>{
      const d=JSON.parse(e.data);
      _allResults=d.results;
      rerender();
      const priced=_allResults.filter(r=>r.price!=null).length;
      $('status').textContent=`Done! ${priced} priced results from ${d.results.length} total listings`;
      $('pfill').style.width='100%';
      $('btn').disabled=false;
      es.close();
    });
    es.onerror=()=>{
      $('status').textContent='Search failed – check server logs or API key.';
      $('btn').disabled=false;
      $('pbar').style.display='none';
      es.close();
    };
  }catch(e){
    $('status').textContent='Error: '+e.message;
    $('btn').disabled=false;
  }
}
</script>
</body>
</html>
